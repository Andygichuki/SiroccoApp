<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Register - Siroco Wildlife Sanctuary</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-savanna: #8B6B4D;
            --secondary-acacia: #5C8D7A;
            --accent-sunset: #C97C5D;
            --water-lake: #4A7A9C;
            --cream-plains: #F5F0E6;
            --dark-earth: #2C3E4F;
            --wildlife-gold: #E6B17E;
            --success-green: #4A7856;
            --error-red: #C45D5D;
            --bg-main: #FAF7F2;
            --card-bg: #FFFFFF;
            --text-dark: #2C3E2F;
            --border-light: #E8E0D5;
        }

        body {
            background: linear-gradient(135deg, var(--primary-savanna) 0%, var(--secondary-acacia) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 450px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 60px;
            color: var(--wildlife-gold);
            background: rgba(255,255,255,0.2);
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .logo-text {
            color: white;
            font-size: 28px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .logo-text span {
            font-size: 14px;
            display: block;
            font-weight: 300;
            opacity: 0.9;
            margin-top: 5px;
        }

        .register-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .welcome {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome h2 {
            color: var(--text-dark);
            font-size: 24px;
            margin-bottom: 5px;
        }

        .welcome p {
            color: #666;
            font-size: 14px;
        }

        /* Alert Messages */
        .alert-container {
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-group label i {
            color: var(--secondary-acacia);
            margin-right: 5px;
        }

        .form-group label .required {
            color: var(--error-red);
            margin-left: 3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #999;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid var(--border-light);
            border-radius: 15px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--secondary-acacia);
            background: white;
            box-shadow: 0 0 0 4px rgba(92, 141, 122, 0.1);
        }

        .input-wrapper .toggle-password {
            position: absolute;
            right: 15px;
            left: auto;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .input-wrapper .toggle-password:hover {
            color: var(--secondary-acacia);
        }

        /* Phone Input */
        .phone-input-wrapper {
            display: flex;
            gap: 10px;
        }

        .phone-prefix {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--border-light);
            color: #666;
            font-weight: 500;
            min-width: 80px;
            text-align: center;
        }

        .phone-input-wrapper .input-wrapper {
            flex: 1;
        }

        /* Password Strength */
        .password-strength {
            margin-top: 8px;
        }

        .strength-bar {
            height: 5px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
        }

        .strength-text {
            font-size: 12px;
            color: #666;
        }

        /* Terms Checkbox */
        .terms-group {
            margin: 20px 0;
        }

        .terms-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .terms-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--secondary-acacia);
        }

        .terms-checkbox span {
            font-size: 14px;
            color: #666;
        }

        .terms-checkbox a {
            color: var(--secondary-acacia);
            text-decoration: none;
            font-weight: 600;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        /* Register Button */
        .register-btn {
            width: 100%;
            background: var(--secondary-acacia);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .register-btn:hover:not(:disabled) {
            background: var(--primary-savanna);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .register-btn i {
            font-size: 18px;
        }

        /* Login Link */
        .login-link {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: var(--secondary-acacia);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .login-link a:hover {
            color: var(--primary-savanna);
            text-decoration: underline;
        }

        /* Back to Home */
        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-home a:hover {
            opacity: 1;
        }

        /* Loading Spinner */
        .fa-spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Validation Icons */
        .validation-icon {
            position: absolute;
            right: 45px;
            color: #999;
        }

        .validation-icon.valid {
            color: var(--success-green);
        }

        .validation-icon.invalid {
            color: var(--error-red);
        }

        /* Info Text */
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-text i {
            color: var(--secondary-acacia);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-tree"></i>
            </div>
            <div class="logo-text">
                Siroco Sanctuary
                <span>Lake Naivasha, Kenya</span>
            </div>
        </div>

        <!-- Register Card -->
        <div class="register-card">
            <div class="welcome">
                <h2>Create Account 🌿</h2>
                <p>Join our wildlife sanctuary community</p>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer" class="alert-container"></div>

            <!-- Register Form -->
            <form id="registerForm" onsubmit="event.preventDefault(); registerUser();">
                <!-- Full Name -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i> Full Name
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" placeholder="Enter your full name" value="andy G" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i> Email Address
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" value="ag@gmail.com" required>
                        <span id="emailValidation" class="validation-icon"></span>
                    </div>
                    <div class="info-text" id="emailInfo">
                        <i class="fas fa-info-circle"></i>
                        We'll never share your email
                    </div>
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-phone"></i> Phone Number
                        <span class="required">*</span>
                    </label>
                    <div class="phone-input-wrapper">
                        <span class="phone-prefix">+254</span>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" placeholder="712345678" value="712345678" required>
                        </div>
                    </div>
                    <div class="info-text">
                        <i class="fas fa-info-circle"></i>
                        Format: 712345678 (7XXXXXXXX)
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i> Password
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Create a password" value="123456" required onkeyup="checkPasswordStrength()">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Enter password</div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i> Confirm Password
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" value="123456" required onkeyup="checkPasswordMatch()">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                    </div>
                    <div class="info-text" id="passwordMatchInfo"></div>
                </div>

                <!-- Terms and Conditions -->
                <div class="terms-group">
                    <label class="terms-checkbox">
                        <input type="checkbox" id="terms" checked>
                        <span>
                            I agree to the 
                            <a href="#" onclick="showTerms()">Terms of Service</a> and 
                            <a href="#" onclick="showPrivacy()">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit" class="register-btn" id="registerBtn">
                    <i class="fas fa-user-plus"></i>
                    <span>Create Account</span>
                </button>
            </form>

            <!-- Login Link -->
            <div class="login-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>

            <!-- Demo Info -->
            <div class="info-text" style="margin-top: 20px; padding: 10px; background: #f8f9fa; border-radius: 10px;">
                <i class="fas fa-info-circle" style="color: var(--secondary-acacia);"></i>
                Demo: Form is pre-filled for testing
            </div>
        </div>

        <!-- Back to Home -->
        <div class="back-home">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA7NuBiPSxLpfMr93R2wNjK9lqkgJ3UqcU",
            authDomain: "sirocco-6668e.firebaseapp.com",
            projectId: "sirocco-6668e",
            storageBucket: "sirocco-6668e.firebasestorage.app",
            messagingSenderId: "892213068784",
            appId: "1:892213068784:web:5b4021e7fbe638999e5335",
            measurementId: "G-BPCVPVC9R7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // DOM Elements
        const registerBtn = document.getElementById('registerBtn');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const termsCheckbox = document.getElementById('terms');
        const alertContainer = document.getElementById('alertContainer');

        // Toggle password visibility
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const toggle = field.nextElementSibling;
            
            if (field.type === 'password') {
                field.type = 'text';
                toggle.classList.remove('fa-eye');
                toggle.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                toggle.classList.remove('fa-eye-slash');
                toggle.classList.add('fa-eye');
            }
        }

        // Check password strength
        function checkPasswordStrength() {
            const password = passwordInput.value;
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            
            // Length check
            if (password.length >= 6) strength += 25;
            if (password.length >= 8) strength += 25;
            
            // Complexity checks
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
            if (/[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password)) strength += 25;
            
            strengthFill.style.width = strength + '%';
            
            if (strength < 25) {
                strengthFill.style.backgroundColor = '#C45D5D';
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#C45D5D';
            } else if (strength < 50) {
                strengthFill.style.backgroundColor = '#E6B17E';
                strengthText.textContent = 'Fair password';
                strengthText.style.color = '#E6B17E';
            } else if (strength < 75) {
                strengthFill.style.backgroundColor = '#5C8D7A';
                strengthText.textContent = 'Good password';
                strengthText.style.color = '#5C8D7A';
            } else {
                strengthFill.style.backgroundColor = '#4A7856';
                strengthText.textContent = 'Strong password';
                strengthText.style.color = '#4A7856';
            }
            
            checkPasswordMatch();
        }

        // Check if passwords match
        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirm = confirmPasswordInput.value;
            const infoDiv = document.getElementById('passwordMatchInfo');
            
            if (confirm.length === 0) {
                infoDiv.innerHTML = '<i class="fas fa-info-circle"></i> Confirm your password';
                infoDiv.style.color = '#666';
            } else if (password === confirm) {
                infoDiv.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
                infoDiv.style.color = '#4A7856';
            } else {
                infoDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
                infoDiv.style.color = '#C45D5D';
            }
        }

        // Validate email format
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Validate phone number
        function validatePhone(phone) {
            const re = /^[0-9]{9}$/;
            return re.test(phone);
        }

        // Show alert function
        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            
            setTimeout(() => {
                if (alertContainer.contains(alert)) {
                    alert.remove();
                }
            }, 5000);
        }

        // Check if email exists
        async function checkEmailExists(email) {
            const snapshot = await db.collection('users')
                .where('email', '==', email)
                .get();
            return !snapshot.empty;
        }

        // Check if phone exists
        async function checkPhoneExists(phone) {
            const fullPhone = '0' + phone; // Add leading 0 to match your format
            const snapshot = await db.collection('users')
                .where('PhoneNumber', '==', fullPhone)
                .get();
            return !snapshot.empty;
        }

        // Register user
        async function registerUser() {
            // Get values
            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim().toLowerCase();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const terms = termsCheckbox.checked;

            // Validation
            if (!fullName || !email || !phone || !password || !confirmPassword) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            if (!validateEmail(email)) {
                showAlert('Please enter a valid email address', 'error');
                return;
            }

            if (!validatePhone(phone)) {
                showAlert('Please enter a valid phone number (9 digits)', 'error');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            if (!terms) {
                showAlert('Please accept the Terms and Conditions', 'error');
                return;
            }

            // Disable button
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

            try {
                // Check if email already exists
                const emailExists = await checkEmailExists(email);
                if (emailExists) {
                    showAlert('Email already registered. Please use a different email or login.', 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    return;
                }

                // Check if phone already exists
                const phoneExists = await checkPhoneExists(phone);
                if (phoneExists) {
                    showAlert('Phone number already registered. Please use a different number or login.', 'error');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    return;
                }

                // Format phone number with leading 0
                const formattedPhone = '0' + phone;

                // Create user data object (matching your Firestore structure)
                const userData = {
                    fullName: fullName,
                    email: email,
                    PhoneNumber: formattedPhone,  // Note: Capital P, capital N as in your table
                    password: password,  // In production, hash this password!
                    timeRegistered: firebase.firestore.FieldValue.serverTimestamp()
                };

                console.log('Creating user:', userData);

                // Add to Firestore (auto-ID will be generated)
                const docRef = await db.collection('users').add(userData);
                
                console.log('✅ User created with ID:', docRef.id);

                // Store in session (auto login after registration)
                const sessionUser = {
                    uid: docRef.id,
                    fullName: fullName,
                    email: email,
                    phone: formattedPhone
                };
                localStorage.setItem('currentUser', JSON.stringify(sessionUser));

                showAlert('✅ Account created successfully! Welcome to Siroco Sanctuary!', 'success');

                // Redirect to homepage
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                console.error('❌ Registration error:', error);
                showAlert('Registration failed: ' + error.message, 'error');
                
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        }

        // Terms and conditions
        function showTerms() {
            showAlert('Terms of Service would be displayed here', 'info');
        }

        function showPrivacy() {
            showAlert('Privacy Policy would be displayed here', 'info');
        }

        // Real-time validation
        emailInput.addEventListener('input', function() {
            const email = this.value;
            const icon = document.getElementById('emailValidation');
            
            if (email.length === 0) {
                icon.innerHTML = '';
            } else if (validateEmail(email)) {
                icon.innerHTML = '<i class="fas fa-check-circle" style="color: #4A7856;"></i>';
                document.getElementById('emailInfo').innerHTML = '<i class="fas fa-check-circle"></i> Valid email format';
                document.getElementById('emailInfo').style.color = '#4A7856';
            } else {
                icon.innerHTML = '<i class="fas fa-exclamation-circle" style="color: #C45D5D;"></i>';
                document.getElementById('emailInfo').innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                document.getElementById('emailInfo').style.color = '#C45D5D';
            }
        });

        phoneInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 9);
        });

        // Check if user is already logged in
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            console.log('User already logged in');
            // Uncomment to auto-redirect:
            // window.location.href = 'index.html';
        }

        console.log('✅ Registration page ready');
    </script>
</body>
</html>
